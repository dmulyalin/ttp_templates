plugins:
- search
- mkdocstrings:
    handlers:
      python:
        rendering:
          docstring_section_style: list
          heading_level: 3
          merge_init_into_class: true
          show_object_full_path: true
          show_root_heading: true
          show_root_toc_entry: true
          show_signature_annotations: true
        selection:
          docstring_style: google
repo_name: dmulyalin/ttp_templates
repo_url: https://github.com/dmulyalin/ttp_templates
site_author: Denis Mulyalin
site_description: Curated TTP templates and a small Python API for parsing network
  device output.
site_name: TTP Templates Collection
site_url: https://dmulyalin.github.io/ttp_templates/
theme:
  custom_dir: docs/overrides
  features:
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - toc.follow
  icon:
    repo: fontawesome/brands/github-alt
  name: material
  palette:
  - accent: teal
    primary: black
    scheme: slate
    toggle:
      icon: material/brightness-7
      name: Switch to light mode
  - accent: teal
    primary: blue grey
    scheme: default
    toggle:
      icon: material/brightness-4
      name: Switch to dark mode
